<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Homepage.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <title>Homepage</title>
    <style>*
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .section1
        {
            width: 100%;
            height: 150px;
            background-color: black;
            justify-content: center;
            align-items: center;
            display: flex;
        }
        .logo
        {
            height: 100%;
        }
        .nav
        {
            width: 100%;
            height: 50px;
            background-color: rgb(136, 36, 12);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .buttons
        {
            text-decoration: none;
            color: rgb(224, 150, 54);
            text-align: center;
            padding: 10px 10px;
            border: 1px solid black;
            border-radius: 20px;
            margin-right: 10px;
            font-weight: bold;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        
        }
        .buttons:hover
        {
             color: white;
        }
        .section2
        {
            justify-content: center;
            align-items: center;
            display: flex;
            padding-left: 75px;
            padding-right: 75px;
            background-color: black;
        }
        .video
        {
            width: 100%;
            height: 100%;
            background-color: black;
        }
        .section3
        {
            width: 100%;
            height: 150px;
            background-color: black;
        }
        #theexclusive
        {
            text-align: center;
            font-family: Kode Mono, Permanent Marker, 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: rgb(238, 155, 86);
            background-color: black;
            padding-top: 70px;
        }
        .section4
        {
            width: 100%;
            height: 500px;
            background-color: black;
            display: flex;
            justify-content: center;
            justify-content: space-evenly;
        }
        .product 
        {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .productimage 
        {
            width: 300px;
            height: 300px;
        }
        #secondimage
        {
            margin-left: 20px;
        }
        h3 
        {
            color: rgb(238, 155, 86);
            margin: 10px;
            padding: 10px;
            font-family: Quattrocento,'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 25px;
            font-weight: bold;
        }
        h3:hover
        {
            color: white;
        }
        
        
        </style>
</head>
<body>
    <div class="section1">
        <img src="Logo.png" class="logo">
    </div>
    <div class="nav">
        <a class="buttons" href="#">Home</a>
        <a class="buttons" href="#">Shop</a>
        <a class="buttons" href="#">Contact Us</a>
        <a class="buttons" href="#">Account</a>
    </div>
    <div class="section2">
        <video class="video" controls autoplay muted>
            <source src="Wallet Video.mp4" type="video/mp4">
            Your browser does not support the video.
        </video>
    </div>
    <div class="section3">
        <h1 id="theexclusive">The Exclusive Picks</h1>
    </div>
    <div class="section4">
        <div class="product">
            <img src="Diesel Brown Leather Wallet - 1.jpg" class="productimage">
            <a href="#"><h3>Diesel Brown Leather</h3></a>
        </div>
        <div class="product" id="secondimage">
            <img src="Woodland Light Brown Leather Wallet - 3.jpg" class="productimage">
            <a href="#"><h3>Woodland Light Brown Leather</h3></a>
        </div>
        <div class="product">
            <img src="Louis Philippe Brown Leather Wallet - 3.jpg" class="productimage">
            <a href="#"><h3>Louis Philippe Brown Leather</h3></a>
        </div>
    </div>
</body>
</html>
